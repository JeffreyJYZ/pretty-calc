<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title">
  <title id="title">Pretty Calc</title>
  <defs>
    <linearGradient id="bodyGrad" x1="64" y1="64" x2="448" y2="448" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2b3a37" />
      <stop offset="1" stop-color="#1c2624" />
    </linearGradient>
    <linearGradient id="screenGrad" x1="120" y1="120" x2="392" y2="208" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0d1614" />
      <stop offset="1" stop-color="#162220" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="312" y1="376" x2="392" y2="376" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6fb8a4" />
      <stop offset="1" stop-color="#4f9e8e" />
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="0" dy="8" result="off" />
      <feComponentTransfer><feFuncA type="linear" slope="0.32" /></feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Calculator body -->
  <rect x="64" y="56" width="384" height="400" rx="64" fill="url(#bodyGrad)" filter="url(#softShadow)" />

  <!-- Display screen -->
  <rect x="104" y="104" width="304" height="104" rx="28" fill="url(#screenGrad)" stroke="#364641" stroke-width="2" />

  <!-- Display content: answer line -->
  <rect x="128" y="152" width="180" height="14" rx="7" fill="#6fb8a4" opacity="0.92" />
  <rect x="320" y="120" width="64" height="14" rx="7" fill="#5e726c" opacity="0.7" />

  <!-- Keypad keys (top row) -->
  <rect x="104" y="240" width="64" height="56" rx="16" fill="#2b3a35" />
  <rect x="184" y="240" width="64" height="56" rx="16" fill="#2b3a35" />
  <rect x="264" y="240" width="64" height="56" rx="16" fill="#2b3a35" />
  <rect x="344" y="240" width="64" height="56" rx="16" fill="#2b3a35" />

  <!-- Keypad keys (middle row) -->
  <rect x="104" y="312" width="64" height="56" rx="16" fill="#2b3a35" />
  <rect x="184" y="312" width="64" height="56" rx="16" fill="#2b3a35" />
  <rect x="264" y="312" width="64" height="56" rx="16" fill="#2b3a35" />
  <rect x="344" y="312" width="64" height="56" rx="16" fill="#2b3a35" />

  <!-- Keypad keys (bottom row) -->
  <rect x="104" y="384" width="144" height="56" rx="16" fill="#2b3a35" />
  <rect x="264" y="384" width="64" height="56" rx="16" fill="#2b3a35" />
  <!-- Equals key (accent) -->
  <rect x="344" y="384" width="64" height="56" rx="16" fill="url(#accentGrad)" />

  <!-- Equals symbol on accent -->
  <rect x="360" y="402" width="32" height="5" rx="2.5" fill="#16201e" />
  <rect x="360" y="416" width="32" height="5" rx="2.5" fill="#16201e" />
</svg>